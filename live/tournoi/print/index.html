<!DOCTYPE html>
<html lang="fr">
<head>
<base href="https://le-rebond.fr/">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournoi — Impression / PDF</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: #1a1a1a;
    background: #fff;
    padding: 1.5rem 2rem;
    line-height: 1.4;
}
h1 { font-size: 1.8rem; margin-bottom: 0.3rem; color: #680920; }
h2 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.6rem; color: #680920; border-bottom: 2px solid #efa707; padding-bottom: 0.3rem; }
h3 { font-size: 1rem; margin-bottom: 0.4rem; color: #444; }
.meta { color: #555; font-size: 0.95rem; margin-bottom: 1.5rem; }
.toolbar { background: #f0f0f0; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
.toolbar button { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #999; background: #fff; cursor: pointer; font-weight: 600; }
.toolbar button:hover { background: #efa707; color: #fff; border-color: #efa707; }
.toolbar .hint { color: #666; font-size: 0.85rem; }

.header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; margin-bottom: 1rem; }
.header-row .header-info { flex: 1; }
.qr-block { text-align: center; }
.qr-block .qr-img { background: #fff; padding: 0.4rem; border: 1px solid #ddd; border-radius: 6px; display: inline-block; }
.qr-block .qr-caption { font-size: 0.75rem; color: #555; margin-top: 0.3rem; max-width: 140px; }

.poules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
}
.poule {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    page-break-inside: avoid;
}
.poule h3 { color: #680920; margin-bottom: 0.5rem; }
.poule-terrain { font-size: 0.85rem; color: #666; margin-bottom: 0.5rem; }
.poule-equipes { list-style: none; padding: 0; }
.poule-equipes li { padding: 0.3rem 0; border-bottom: 1px dashed #eee; font-size: 0.95rem; }
.poule-equipes li:last-child { border-bottom: none; }
.poule-equipes .niveau { color: #888; font-size: 0.8rem; margin-left: 0.5rem; }

.matchs-section { margin-bottom: 1.5rem; page-break-inside: avoid; }
.matchs-bracket { margin-bottom: 1rem; }
.matchs-bracket h3 { background: #f6f0e0; padding: 0.4rem 0.6rem; border-radius: 6px; margin-bottom: 0.4rem; }
table.matchs {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
}
table.matchs th, table.matchs td {
    padding: 0.4rem 0.6rem;
    border: 1px solid #ddd;
    text-align: left;
}
table.matchs th { background: #f5f5f5; font-weight: 700; }
table.matchs td.score { text-align: center; font-weight: 700; font-family: ui-monospace, Menlo, monospace; }
table.matchs td.terrain { text-align: center; width: 70px; color: #666; }
table.matchs tr.termine td { color: #666; }
table.matchs tr.en_cours td { background: #fff8e8; }

.classement-final {
    border: 2px solid #efa707;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
    page-break-inside: avoid;
}
.classement-final h3 { color: #680920; margin-bottom: 0.5rem; }
.classement-final table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
.classement-final td { padding: 0.3rem 0.5rem; border-bottom: 1px dashed #eee; }
.classement-final .rank { font-weight: 700; color: #680920; width: 80px; }

.empty { color: #999; font-style: italic; padding: 2rem; text-align: center; }

@media print {
    body { padding: 1cm; font-size: 11pt; }
    .toolbar { display: none !important; }
    h1 { font-size: 18pt; }
    h2 { font-size: 14pt; }
    h3 { font-size: 12pt; }
    .poule, .matchs-section, .classement-final { break-inside: avoid; }
}
</style>
</head>
<body>

<div class="toolbar">
<button onclick="window.print()">🖨️ Imprimer / Enregistrer en PDF</button>
<button onclick="window.close()">✕ Fermer</button>
<span class="hint">Astuce : choisis « Enregistrer au format PDF » dans la boîte d'impression.</span>
</div>

<div id="content">
<p class="empty">Chargement…</p>
</div>

<script src="js/vendor/supabase.min.js"></script>
<script src="js/vendor/qrcode.min.js"></script>
<script src="js/resa-config.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/tournoi-print.js"></script>

</body>
</html>
