<!DOCTYPE html>
<html lang="fr">
<head>
<base href="https://le-rebond.fr/">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournoi TV — Le Rebond</title>
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="refresh" content="60">
<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    width: 100%;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #680920 0%, #4d061a 100%);
    color: #f4f0e6;
    overflow: hidden;
}

/* Layout principal en grid vertical : header / live / poules / footer */
.tv-app {
    height: 100vh;
    width: 100vw;
    padding: 1.5vh 1.5vw;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 1.2vh;
    overflow: hidden;
}

/* === Header === */
.tv-header {
    text-align: center;
    padding-bottom: 0.8vh;
    border-bottom: 2px solid rgba(244, 201, 65, 0.35);
}
.tv-title {
    font-size: clamp(1.8rem, 3.4vh, 3rem);
    font-weight: 800;
    color: #f4c941;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.1;
}
.tv-subtitle {
    font-size: clamp(0.9rem, 1.7vh, 1.3rem);
    color: rgba(244, 240, 230, 0.75);
    margin-top: 0.3vh;
}

/* === En direct (bandeau horizontal) === */
.tv-live {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    gap: 1vw;
    min-height: 0;
}
.tv-live-label {
    font-size: clamp(0.9rem, 1.8vh, 1.4rem);
    color: #ea1a15;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 800;
    white-space: nowrap;
    padding-right: 1vw;
    border-right: 1px solid rgba(244, 240, 230, 0.15);
    display: flex;
    align-items: center;
    gap: 0.5vw;
}
.tv-live-pulse {
    display: inline-block;
    width: 0.8em;
    height: 0.8em;
    border-radius: 50%;
    background: #ea1a15;
    box-shadow: 0 0 12px #ea1a15;
    animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
}
.tv-live-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
    gap: 1vw;
    min-width: 0;
}
.tv-match {
    background: rgba(234, 26, 21, 0.16);
    border: 2px solid #ea1a15;
    border-radius: 10px;
    padding: 0.8vh 1vw;
    box-shadow: 0 4px 16px rgba(234, 26, 21, 0.25);
    min-width: 0;
}
.tv-match-meta {
    font-size: clamp(0.7rem, 1.2vh, 0.95rem);
    color: rgba(244, 240, 230, 0.7);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    margin-bottom: 0.3vh;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tv-match-body {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 0.6vw;
    min-width: 0;
}
.tv-match-equipe {
    font-size: clamp(0.9rem, 1.8vh, 1.4rem);
    font-weight: 700;
    color: #f4f0e6;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
}
.tv-match-equipe:last-child { text-align: right; }
.tv-match-score {
    font-size: clamp(1.2rem, 2.6vh, 2.2rem);
    font-weight: 800;
    color: #f4c941;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
}
.tv-live-empty {
    font-size: clamp(0.9rem, 1.6vh, 1.2rem);
    color: rgba(244, 240, 230, 0.4);
    font-style: italic;
    text-align: center;
}

/* === Classements de poule (occupe le reste de l'écran) === */
.tv-poules-section {
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 0.8vh;
    min-height: 0;
    overflow: hidden;
}
.tv-poules-section-title {
    font-size: clamp(1rem, 2vh, 1.5rem);
    color: #efa707;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 800;
    padding-bottom: 0.4vh;
    border-bottom: 1px solid rgba(244, 201, 65, 0.25);
}
.tv-poules-grid {
    display: grid;
    /* Le nb de colonnes est défini en inline-style par le JS selon nb de poules */
    gap: 1vw;
    min-height: 0;
    overflow: hidden;
}
.tv-poule {
    background: rgba(244, 240, 230, 0.06);
    border: 1px solid rgba(239, 167, 7, 0.35);
    border-radius: 10px;
    padding: 0.8vh 0.9vw;
    display: flex;
    flex-direction: column;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
}
.tv-poule-nom {
    font-size: clamp(1rem, 2vh, 1.4rem);
    font-weight: 800;
    color: #f4c941;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5vh;
    padding-bottom: 0.3vh;
    border-bottom: 1px solid rgba(244, 240, 230, 0.12);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tv-poule-table {
    width: 100%;
    border-collapse: collapse;
    flex: 1;
    min-height: 0;
}
.tv-poule-table th {
    font-size: clamp(0.65rem, 1.1vh, 0.85rem);
    color: rgba(244, 240, 230, 0.5);
    text-transform: uppercase;
    text-align: center;
    padding: 0.2vh 0.2vw;
    font-weight: 600;
}
.tv-poule-table th.left { text-align: left; }
.tv-poule-table td {
    padding: 0.4vh 0.3vw;
    color: #f4f0e6;
    font-variant-numeric: tabular-nums;
    text-align: center;
    font-size: clamp(0.85rem, 1.6vh, 1.15rem);
    border-bottom: 1px solid rgba(244, 240, 230, 0.06);
}
.tv-poule-table tr:last-child td { border-bottom: none; }
.tv-poule-table td.equipe {
    text-align: left;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 0;
    width: 100%;
}
.tv-poule-table td.pos {
    color: #efa707;
    font-weight: 800;
    width: 2.5em;
}
.tv-poule-table td.v {
    color: #f4c941;
    font-weight: 800;
}

/* === Footer & états === */
.tv-footer {
    font-size: clamp(0.6rem, 1vh, 0.8rem);
    color: rgba(244, 240, 230, 0.4);
    text-align: right;
    padding-top: 0.4vh;
}
.tv-loading {
    text-align: center;
    font-size: clamp(1rem, 2vh, 1.4rem);
    color: rgba(244, 240, 230, 0.6);
    padding: 5vh 2vw;
}
.tv-error {
    background: rgba(234, 26, 21, 0.2);
    border: 1px solid #ea1a15;
    border-radius: 10px;
    padding: 2vh 2vw;
    text-align: center;
    margin: 2vh;
}
.tv-empty {
    color: rgba(244, 240, 230, 0.5);
    font-style: italic;
    font-size: clamp(0.9rem, 1.6vh, 1.2rem);
    text-align: center;
    padding: 2vh;
}
</style>
</head>
<body>

<div class="tv-app">
    <header class="tv-header">
        <div class="tv-title" id="t-title">Tournoi en direct</div>
        <div class="tv-subtitle" id="t-subtitle">Chargement…</div>
    </header>

    <section class="tv-live" id="sec-live">
        <div class="tv-live-label"><span class="tv-live-pulse"></span> En direct</div>
        <div class="tv-live-grid" id="live-matchs">
            <div class="tv-loading">…</div>
        </div>
    </section>

    <section class="tv-poules-section">
        <div class="tv-poules-section-title">🎾 Classements de poule</div>
        <div class="tv-poules-grid" id="poules-list">
            <div class="tv-loading">…</div>
        </div>
    </section>

    <div class="tv-footer">Mise à jour live · le-rebond.fr/live/tournoi/tv/</div>
</div>

<script src="js/resa-config.min.js"></script>
<script src="js/tournoi-tv.js"></script>

</body>
</html>
