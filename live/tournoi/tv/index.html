<!DOCTYPE html>
<html lang="fr">
<head>
<base href="https://le-rebond.fr/">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournoi TV — Le Rebond</title>
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="refresh" content="60">
<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    width: 100%;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #680920 0%, #4d061a 100%);
    color: #f4f0e6;
    overflow: hidden;
}

/* Layout principal : flex column */
.tv-app {
    height: 100%;
    width: 100%;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* === Header === */
.tv-header {
    flex: 0 0 auto;
    text-align: center;
    padding-bottom: 6px;
    border-bottom: 2px solid rgba(244, 201, 65, 0.35);
    margin-bottom: 8px;
}
.tv-title {
    font-size: 26px;
    font-weight: 800;
    color: #f4c941;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.1;
}
.tv-subtitle {
    font-size: 13px;
    color: rgba(244, 240, 230, 0.75);
    margin-top: 2px;
}

/* === En direct === */
.tv-live {
    flex: 0 0 auto;
    margin-bottom: 8px;
    display: flex;
    align-items: stretch;
    min-height: 60px;
}
.tv-live-label {
    flex: 0 0 auto;
    font-size: 14px;
    color: #ea1a15;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 800;
    white-space: nowrap;
    padding: 6px 12px 6px 0;
    border-right: 2px solid rgba(244, 240, 230, 0.15);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-right: 12px;
}
.tv-live-pulse {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ea1a15;
    box-shadow: 0 0 10px #ea1a15;
}
.tv-live-grid {
    flex: 1 1 auto;
    display: flex;
    gap: 8px;
    min-width: 0;
}
.tv-match {
    flex: 1 1 0;
    background: rgba(234, 26, 21, 0.16);
    border: 2px solid #ea1a15;
    border-radius: 8px;
    padding: 6px 10px;
    min-width: 0;
}
.tv-match-meta {
    font-size: 11px;
    color: rgba(244, 240, 230, 0.7);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tv-match-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
}
.tv-match-equipe {
    flex: 1 1 0;
    font-size: 14px;
    font-weight: 700;
    color: #f4f0e6;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
}
.tv-match-equipe.tv-eq-b { text-align: right; }
.tv-match-score {
    flex: 0 0 auto;
    font-size: 18px;
    font-weight: 800;
    color: #f4c941;
    white-space: nowrap;
}
.tv-live-empty {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: rgba(244, 240, 230, 0.4);
    font-style: italic;
}

/* === Classements (le bloc principal, occupe tout le reste) === */
.tv-poules-section {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
}
.tv-poules-section-title {
    flex: 0 0 auto;
    font-size: 15px;
    color: #efa707;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 800;
    padding-bottom: 4px;
    margin-bottom: 6px;
    border-bottom: 1px solid rgba(244, 201, 65, 0.25);
}
.tv-poules-grid {
    flex: 1 1 auto;
    display: flex;
    gap: 8px;
    min-height: 0;
    overflow: hidden;
}
.tv-poule {
    flex: 1 1 0;
    background: rgba(244, 240, 230, 0.06);
    border: 1px solid rgba(239, 167, 7, 0.35);
    border-radius: 8px;
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
}
.tv-poule-nom {
    flex: 0 0 auto;
    font-size: 16px;
    font-weight: 800;
    color: #f4c941;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    padding-bottom: 3px;
    border-bottom: 1px solid rgba(244, 240, 230, 0.12);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tv-poule-table {
    flex: 1 1 auto;
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    min-height: 0;
}
.tv-poule-table th {
    font-size: 10px;
    color: rgba(244, 240, 230, 0.5);
    text-transform: uppercase;
    text-align: center;
    padding: 2px 3px;
    font-weight: 600;
}
.tv-poule-table th.left { text-align: left; }
.tv-poule-table td {
    padding: 4px 3px;
    color: #f4f0e6;
    text-align: center;
    font-size: 14px;
    border-bottom: 1px solid rgba(244, 240, 230, 0.06);
    line-height: 1.2;
}
.tv-poule-table tr:last-child td { border-bottom: none; }
.tv-poule-table td.equipe {
    text-align: left;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.tv-poule-table td.pos {
    color: #efa707;
    font-weight: 800;
    width: 32px;
}
.tv-poule-table td.v {
    color: #f4c941;
    font-weight: 800;
}
.tv-poule-table th.col-mj, .tv-poule-table td.col-mj,
.tv-poule-table th.col-v, .tv-poule-table td.col-v { width: 30px; }
.tv-poule-table th.col-s, .tv-poule-table td.col-s,
.tv-poule-table th.col-j, .tv-poule-table td.col-j { width: 38px; }

/* === Footer & états === */
.tv-footer {
    flex: 0 0 auto;
    font-size: 10px;
    color: rgba(244, 240, 230, 0.4);
    text-align: right;
    padding-top: 4px;
}
.tv-loading {
    text-align: center;
    font-size: 16px;
    color: rgba(244, 240, 230, 0.6);
    padding: 30px;
}
.tv-error {
    background: rgba(234, 26, 21, 0.2);
    border: 1px solid #ea1a15;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    margin: 12px;
}
.tv-empty {
    color: rgba(244, 240, 230, 0.5);
    font-style: italic;
    font-size: 14px;
    text-align: center;
    padding: 16px;
}
</style>
</head>
<body>

<div class="tv-app">
    <header class="tv-header">
        <div class="tv-title" id="t-title">Tournoi en direct</div>
        <div class="tv-subtitle" id="t-subtitle">Chargement…</div>
    </header>

    <section class="tv-live">
        <div class="tv-live-label"><span class="tv-live-pulse"></span> En direct</div>
        <div class="tv-live-grid" id="live-matchs">
            <div class="tv-loading">…</div>
        </div>
    </section>

    <section class="tv-poules-section">
        <div class="tv-poules-section-title">Classements de poule</div>
        <div class="tv-poules-grid" id="poules-list">
            <div class="tv-loading">…</div>
        </div>
    </section>

    <div class="tv-footer">le-rebond.fr/live/tournoi/tv/</div>
</div>

<script src="js/resa-config.min.js"></script>
<script src="js/tournoi-tv.js"></script>

</body>
</html>
