<!DOCTYPE html>
<html lang="fr">
<head>
<base href="https://le-rebond.fr/">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournoi TV — Le Rebond</title>
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="refresh" content="60">
<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    width: 100%;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #680920 0%, #4d061a 100%);
    color: #f4f0e6;
    overflow: hidden;
}

.tv-app {
    height: 100%;
    width: 100%;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* === Header === */
.tv-header {
    flex: 0 0 auto;
    text-align: center;
    padding-bottom: 6px;
    border-bottom: 2px solid rgba(244, 201, 65, 0.35);
    margin-bottom: 8px;
}
.tv-title {
    font-size: 24px;
    font-weight: 800;
    color: #f4c941;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.1;
}
.tv-subtitle {
    font-size: 12px;
    color: rgba(244, 240, 230, 0.75);
    margin-top: 2px;
}

/* === Corps principal : 2 colonnes : classements à gauche, live+prochains à droite === */
.tv-main {
    flex: 1 1 auto;
    display: flex;
    gap: 10px;
    min-height: 0;
    overflow: hidden;
}

.tv-main-left {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
}
.tv-main-right {
    flex: 0 0 32%;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    gap: 8px;
}

/* === Section live (matchs en cours) === */
.tv-live-section,
.tv-upcoming-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1 1 50%;
    overflow: hidden;
}
.tv-section-title {
    flex: 0 0 auto;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 800;
    padding-bottom: 4px;
    margin-bottom: 6px;
    border-bottom: 1px solid rgba(244, 201, 65, 0.25);
    display: flex;
    align-items: center;
    gap: 6px;
}
.tv-section-title.tv-section-title--live {
    color: #ea1a15;
    border-bottom-color: rgba(234, 26, 21, 0.35);
}
.tv-section-title.tv-section-title--upcoming { color: #efa707; }
.tv-section-title.tv-section-title--main { color: #f4c941; font-size: 15px; }
.tv-live-pulse {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ea1a15;
    box-shadow: 0 0 8px #ea1a15;
}

.tv-matchs-list {
    flex: 1 1 auto;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.tv-match {
    background: rgba(244, 240, 230, 0.05);
    border: 1px solid rgba(244, 240, 230, 0.15);
    border-radius: 8px;
    padding: 6px 10px;
}
.tv-match--upcoming {
    background: rgba(239, 167, 7, 0.08);
    border-color: rgba(239, 167, 7, 0.3);
}
.tv-live-section .tv-match {
    background: rgba(234, 26, 21, 0.16);
    border: 2px solid #ea1a15;
    box-shadow: 0 4px 16px rgba(234, 26, 21, 0.25);
}
.tv-match-meta {
    font-size: 10px;
    color: rgba(244, 240, 230, 0.7);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tv-match-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
}
.tv-match-equipe {
    flex: 1 1 0;
    font-size: 13px;
    font-weight: 700;
    color: #f4f0e6;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
}
.tv-match-equipe.tv-eq-b { text-align: right; }
.tv-match-score {
    flex: 0 0 auto;
    font-size: 16px;
    font-weight: 800;
    color: #f4c941;
    white-space: nowrap;
}
.tv-match-score--vs {
    color: rgba(244, 240, 230, 0.45);
    font-size: 13px;
    font-weight: 600;
}
.tv-live-empty,
.tv-empty {
    color: rgba(244, 240, 230, 0.4);
    font-style: italic;
    font-size: 12px;
    text-align: center;
    padding: 12px;
}

/* === Section principale gauche (classements ou brackets finale) === */
.tv-main-block {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
}
.tv-main-content {
    flex: 1 1 auto;
    display: flex;
    gap: 8px;
    min-height: 0;
    overflow: hidden;
}

/* Mode poule : N poules en colonnes */
body[data-mode="poule"] #poules-list { flex-direction: row; }
.tv-poule {
    flex: 1 1 0;
    background: rgba(244, 240, 230, 0.06);
    border: 1px solid rgba(239, 167, 7, 0.35);
    border-radius: 8px;
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
}
.tv-poule-nom {
    flex: 0 0 auto;
    font-size: 15px;
    font-weight: 800;
    color: #f4c941;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    padding-bottom: 3px;
    border-bottom: 1px solid rgba(244, 240, 230, 0.12);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tv-poule-table {
    flex: 1 1 auto;
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}
.tv-poule-table th {
    font-size: 10px;
    color: rgba(244, 240, 230, 0.5);
    text-transform: uppercase;
    text-align: center;
    padding: 2px 3px;
    font-weight: 600;
}
.tv-poule-table th.left { text-align: left; }
.tv-poule-table td {
    padding: 4px 3px;
    color: #f4f0e6;
    text-align: center;
    font-size: 13px;
    border-bottom: 1px solid rgba(244, 240, 230, 0.06);
    line-height: 1.2;
}
.tv-poule-table tr:last-child td { border-bottom: none; }
.tv-poule-table td.equipe {
    text-align: left;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.tv-poule-table td.pos {
    color: #efa707;
    font-weight: 800;
    width: 30px;
}
.tv-poule-table td.v {
    color: #f4c941;
    font-weight: 800;
}
.tv-poule-table th.col-mj, .tv-poule-table td.col-mj,
.tv-poule-table th.col-v, .tv-poule-table td.col-v { width: 28px; }
.tv-poule-table th.col-s, .tv-poule-table td.col-s,
.tv-poule-table th.col-j, .tv-poule-table td.col-j { width: 36px; }

/* Mode finale : brackets verticalement */
body[data-mode="finale"] #poules-list { flex-direction: column; gap: 10px; }
.tv-bracket {
    background: rgba(244, 201, 65, 0.06);
    border: 1px solid rgba(244, 201, 65, 0.35);
    border-radius: 8px;
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    min-height: 0;
}
.tv-bracket-title {
    flex: 0 0 auto;
    font-size: 14px;
    font-weight: 800;
    color: #f4c941;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
}
.tv-bracket-matchs {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
}

/* === Footer === */
.tv-footer {
    flex: 0 0 auto;
    font-size: 10px;
    color: rgba(244, 240, 230, 0.4);
    text-align: right;
    padding-top: 4px;
}
.tv-loading {
    text-align: center;
    font-size: 16px;
    color: rgba(244, 240, 230, 0.6);
    padding: 20px;
}
.tv-error {
    background: rgba(234, 26, 21, 0.2);
    border: 1px solid #ea1a15;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    margin: 12px;
}
</style>
</head>
<body>

<div class="tv-app">
    <header class="tv-header">
        <div class="tv-title" id="t-title">Tournoi en direct</div>
        <div class="tv-subtitle" id="t-subtitle">Chargement…</div>
    </header>

    <div class="tv-main">
        <div class="tv-main-left">
            <div class="tv-main-block">
                <div class="tv-section-title tv-section-title--main" id="poules-section-title">Classements de poule</div>
                <div class="tv-main-content" id="poules-list">
                    <div class="tv-loading">…</div>
                </div>
            </div>
        </div>

        <div class="tv-main-right">
            <div class="tv-live-section">
                <div class="tv-section-title tv-section-title--live">
                    <span class="tv-live-pulse"></span> En direct
                </div>
                <div class="tv-matchs-list" id="live-matchs">
                    <div class="tv-loading">…</div>
                </div>
            </div>
            <div class="tv-upcoming-section">
                <div class="tv-section-title tv-section-title--upcoming">⏭ Prochains matchs</div>
                <div class="tv-matchs-list" id="upcoming-matchs">
                    <div class="tv-loading">…</div>
                </div>
            </div>
        </div>
    </div>

    <div class="tv-footer">le-rebond.fr/live/tournoi/tv/</div>
</div>

<script src="js/resa-config.min.js"></script>
<script src="js/tournoi-tv.js"></script>

</body>
</html>
