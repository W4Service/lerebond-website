<!DOCTYPE html>
<html lang="fr">
<head>
<base href="https://le-rebond.fr/">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournoi TV — Le Rebond</title>
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="refresh" content="60">
<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    width: 100%;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #680920 0%, #4d061a 100%);
    color: #f4f0e6;
    overflow: hidden;
}

.tv-app {
    height: 100%;
    width: 100%;
    padding: 8px 12px 6px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* === Header === */
.tv-header {
    flex: 0 0 auto;
    text-align: center;
    padding-bottom: 6px;
    border-bottom: 2px solid rgba(244, 201, 65, 0.35);
    margin-bottom: 8px;
}
.tv-title {
    font-size: 26px;
    font-weight: 800;
    color: #f4c941;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.1;
}
.tv-subtitle {
    font-size: 13px;
    color: rgba(244, 240, 230, 0.75);
    margin-top: 2px;
}

/* === Corps principal : 2 colonnes : classements à gauche, live+prochains à droite === */
.tv-main {
    flex: 1 1 auto;
    display: flex;
    gap: 10px;
    min-height: 0;
    overflow: hidden;
    margin-bottom: 8px;
}

.tv-main-left {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
}
.tv-main-right {
    flex: 0 0 33%;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    gap: 8px;
}

/* === Section live (matchs en cours) === */
.tv-live-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
}
/* Quand il y a des matchs en cours, la section live prend la moitié */
body[data-has-live="yes"] .tv-live-section { flex: 1 1 50%; }
body[data-has-live="yes"] .tv-upcoming-section { flex: 1 1 50%; }
/* Quand il n'y en a pas, on masque complètement la section live */
body[data-has-live="no"] .tv-live-section { display: none; }
body[data-has-live="no"] .tv-upcoming-section { flex: 1 1 auto; }

.tv-upcoming-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
}
.tv-section-title {
    flex: 0 0 auto;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 800;
    padding-bottom: 3px;
    margin-bottom: 5px;
    border-bottom: 1px solid rgba(244, 201, 65, 0.25);
    display: flex;
    align-items: center;
    gap: 5px;
}
.tv-section-title.tv-section-title--live {
    color: #ea1a15;
    border-bottom-color: rgba(234, 26, 21, 0.35);
}
.tv-section-title.tv-section-title--upcoming { color: #efa707; }
.tv-section-title.tv-section-title--main { color: #f4c941; font-size: 16px; }
.tv-section-title.tv-section-title--results { color: #6ee7a7; font-size: 13px; border-bottom-color: rgba(110, 231, 167, 0.25); }
.tv-live-pulse {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ea1a15;
    box-shadow: 0 0 10px #ea1a15;
    animation: pulse-live 1.5s ease-in-out infinite;
}
@keyframes pulse-live {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.8); }
}

.tv-matchs-list {
    flex: 1 1 auto;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.tv-match {
    background: rgba(244, 240, 230, 0.05);
    border: 1px solid rgba(244, 240, 230, 0.15);
    border-radius: 6px;
    padding: 4px 8px;
}
.tv-match--upcoming {
    background: rgba(239, 167, 7, 0.08);
    border-color: rgba(239, 167, 7, 0.3);
}
.tv-match--done {
    background: rgba(110, 231, 167, 0.06);
    border-color: rgba(110, 231, 167, 0.25);
    opacity: 0.85;
}
.tv-live-section .tv-match {
    background: rgba(234, 26, 21, 0.18);
    border: 2px solid #ea1a15;
    box-shadow: 0 4px 16px rgba(234, 26, 21, 0.25);
    padding: 8px 12px;
}
.tv-match-meta {
    font-size: 9px;
    color: rgba(244, 240, 230, 0.7);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 700;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.1;
}
.tv-live-section .tv-match-meta { font-size: 11px; }
.tv-match-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    min-width: 0;
}
.tv-match-equipe {
    flex: 1 1 0;
    font-size: 12px;
    font-weight: 700;
    color: #f4f0e6;
    min-width: 0;
    line-height: 1.1;
}
.tv-live-section .tv-match-equipe { font-size: 14px; line-height: 1.2; }
/* Affichage sur 2 lignes : "Nom1" / "Nom2" */
.tv-match-equipe .tv-eq-line {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.1;
}
.tv-match-equipe .tv-eq-line--2 {
    color: rgba(244, 240, 230, 0.75);
    font-weight: 500;
    font-size: 0.78em;
}
.tv-live-section .tv-match-equipe .tv-eq-line--2 { font-size: 0.85em; }
.tv-match-equipe.tv-eq-b { text-align: right; }
.tv-match-equipe.tv-eq-b .tv-eq-line { text-align: right; }
/* Gagnant en vert */
.tv-match-equipe.tv-eq-winner { color: #6ee7a7; }
.tv-match-equipe.tv-eq-winner .tv-eq-line--2 { color: rgba(110, 231, 167, 0.85); }

.tv-match-score {
    flex: 0 0 auto;
    font-size: 14px;
    font-weight: 800;
    color: #f4c941;
    white-space: nowrap;
    padding: 0 4px;
}
.tv-live-section .tv-match-score { font-size: 22px; padding: 0 6px; }
.tv-match-score--vs {
    color: rgba(244, 240, 230, 0.45);
    font-size: 11px;
    font-weight: 600;
}
.tv-live-section .tv-match-score--vs { font-size: 13px; }
.tv-live-empty,
.tv-empty {
    color: rgba(244, 240, 230, 0.4);
    font-style: italic;
    font-size: 13px;
    text-align: center;
    padding: 12px;
}

/* === Section principale gauche (classements ou brackets finale) === */
.tv-main-block {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
}
.tv-main-content {
    flex: 1 1 auto;
    display: flex;
    gap: 8px;
    min-height: 0;
    overflow: hidden;
}

/* Mode poule : N poules en colonnes */
body[data-mode="poule"] #poules-list { flex-direction: row; }
.tv-poule {
    flex: 1 1 0;
    background: rgba(244, 240, 230, 0.06);
    border: 1px solid rgba(239, 167, 7, 0.35);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
}
.tv-poule-nom {
    flex: 0 0 auto;
    font-size: 16px;
    font-weight: 800;
    color: #f4c941;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(244, 240, 230, 0.15);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tv-poule-table {
    flex: 1 1 auto;
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}
.tv-poule-table th {
    font-size: 10px;
    color: rgba(244, 240, 230, 0.5);
    text-transform: uppercase;
    text-align: center;
    padding: 3px 3px;
    font-weight: 700;
    border-bottom: 1px solid rgba(244, 240, 230, 0.08);
}
.tv-poule-table th.left { text-align: left; padding-left: 6px; }
.tv-poule-table td {
    padding: 2px 3px;
    color: #f4f0e6;
    text-align: center;
    font-size: 13px;
    border-bottom: 1px solid rgba(244, 240, 230, 0.06);
    line-height: 1.1;
}
.tv-poule-table tr:last-child td { border-bottom: none; }
.tv-poule-table td.equipe {
    text-align: left;
    font-weight: 600;
    padding-left: 6px;
    line-height: 1.05;
}
.tv-poule-table td.equipe .tv-eq-line {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.1;
}
.tv-poule-table td.equipe .tv-eq-line--1 {
    font-size: 0.95em;
}
.tv-poule-table td.equipe .tv-eq-line--2 {
    color: rgba(244, 240, 230, 0.7);
    font-weight: 500;
    font-size: 0.78em;
}
.tv-poule-table td.pos {
    color: #efa707;
    font-weight: 800;
    width: 32px;
    font-size: 14px;
}
.tv-poule-table td.v {
    color: #f4c941;
    font-weight: 800;
}
.tv-poule-table th.col-mj, .tv-poule-table td.col-mj { width: 28px; }
.tv-poule-table th.col-v, .tv-poule-table td.col-v { width: 28px; }
.tv-poule-table th.col-s, .tv-poule-table td.col-s,
.tv-poule-table th.col-j, .tv-poule-table td.col-j { width: 36px; }

/* Mode finale : brackets verticalement */
body[data-mode="finale"] #poules-list { flex-direction: column; gap: 10px; }
.tv-bracket {
    background: rgba(244, 201, 65, 0.06);
    border: 1px solid rgba(244, 201, 65, 0.35);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    min-height: 0;
}
.tv-bracket-title {
    flex: 0 0 auto;
    font-size: 14px;
    font-weight: 800;
    color: #f4c941;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
}
.tv-bracket-matchs {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
}

/* === Bandeau "Derniers résultats" en bas === */
.tv-results-section {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    max-height: 145px;
    overflow: hidden;
}
.tv-results-grid {
    display: flex;
    gap: 8px;
    overflow: hidden;
}
.tv-result-card {
    flex: 1 1 0;
    background: rgba(110, 231, 167, 0.06);
    border: 1px solid rgba(110, 231, 167, 0.3);
    border-radius: 8px;
    padding: 5px 10px;
    min-width: 0;
}
.tv-result-card .tv-match-meta {
    color: rgba(110, 231, 167, 0.7);
}

/* === Footer === */
.tv-footer {
    flex: 0 0 auto;
    font-size: 10px;
    color: rgba(244, 240, 230, 0.35);
    text-align: right;
    padding-top: 4px;
}
.tv-loading {
    text-align: center;
    font-size: 16px;
    color: rgba(244, 240, 230, 0.6);
    padding: 20px;
}
.tv-error {
    background: rgba(234, 26, 21, 0.2);
    border: 1px solid #ea1a15;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    margin: 12px;
}
</style>
</head>
<body data-has-live="no">

<div class="tv-app">
    <header class="tv-header">
        <div class="tv-title" id="t-title">Tournoi en direct</div>
        <div class="tv-subtitle" id="t-subtitle">Chargement…</div>
    </header>

    <div class="tv-main">
        <div class="tv-main-left">
            <div class="tv-main-block">
                <div class="tv-section-title tv-section-title--main" id="poules-section-title">Classements de poule</div>
                <div class="tv-main-content" id="poules-list">
                    <div class="tv-loading">…</div>
                </div>
            </div>
        </div>

        <div class="tv-main-right">
            <div class="tv-live-section">
                <div class="tv-section-title tv-section-title--live">
                    <span class="tv-live-pulse"></span> En direct
                </div>
                <div class="tv-matchs-list" id="live-matchs">
                    <div class="tv-loading">…</div>
                </div>
            </div>
            <div class="tv-upcoming-section">
                <div class="tv-section-title tv-section-title--upcoming">⏭ Prochains matchs</div>
                <div class="tv-matchs-list" id="upcoming-matchs">
                    <div class="tv-loading">…</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bandeau "Derniers résultats" en bas -->
    <section class="tv-results-section" id="results-section" style="display:none">
        <div class="tv-section-title tv-section-title--results">✓ Derniers résultats</div>
        <div class="tv-results-grid" id="results-list"></div>
    </section>

    <div class="tv-footer">le-rebond.fr/live/tournoi/tv/</div>
</div>

<script src="js/resa-config.min.js"></script>
<script src="js/tournoi-tv.js"></script>

</body>
</html>
