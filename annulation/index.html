<body class="">
<div class="annul-logo">
<a href="./"><img alt="Le Rebond" decoding="async" loading="lazy" src="img/logo-bordeaux.svg"/></a>
</div>
<div class="annul-card">
<div id="cancelForm">
<div class="annul-icon">🗓️</div>
<h2>Annuler ma réservation restaurant</h2>
<p>Êtes-vous sûr de vouloir annuler votre réservation restaurant au Rebond ?</p>
<div class="annul-info-box" id="resaInfo">
<p class="annul-loading">Chargement...</p>
</div>
<button class="annul-btn annul-btn-danger" onclick="cancelReservation()">Annuler ma réservation</button>
<br/>
<button class="annul-btn annul-btn-secondary" onclick="window.close()">Garder ma réservation</button>
</div>
<div id="result">
<div class="annul-success-icon" id="resultIcon"></div>
<h2 id="resultTitle"></h2>
<p id="resultMsg"></p>
</div>
</div>
<script src="js/resa-config.min.js"></script>
<script>
const ANNUL_CONFIG = window.REBOND_CONFIG || {};

const SUPABASE_URL = ANNUL_CONFIG.SUPABASE_URL;
const SUPABASE_ANON_KEY = ANNUL_CONFIG.SUPABASE_ANON_KEY;

// Récupérer le token depuis l'URL : /annulation/?token=XXXXX
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

if (!token) {
    document.getElementById('cancelForm').innerHTML = `
        <div class="annul-icon">⚠️</div>
        <h2>Lien invalide</h2>
        <p>Ce lien d'annulation est invalide ou a expiré.</p>`;
}

if (!SUPABASE_URL || SUPABASE_URL.includes('XXXXX') || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes('XXXXX')) {
    document.getElementById('cancelForm').innerHTML = `
        <div class="annul-icon">⚠️</div>
        <h2>Configuration manquante</h2>
        <p>La configuration Supabase est absente. Vérifiez js/resa-config.min.js.</p>`;
}

async function cancelReservation() {
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/annuler_reservation`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({ p_token: token }),
        });
        const data = await res.json();

        document.getElementById('cancelForm').style.display = 'none';
        document.getElementById('result').style.display = 'block';

        if (data.success) {
            document.getElementById('resultIcon').textContent = '✓';
            document.getElementById('resultTitle').textContent = 'Réservation annulée';
            document.getElementById('resultMsg').textContent = 'Votre réservation a bien été annulée. Vous recevrez un email de confirmation.';

            // Notifier n8n de l'annulation
            if (ANNUL_CONFIG.N8N_WEBHOOK_URL_ANNULATION) {
                try {
                    await fetch(ANNUL_CONFIG.N8N_WEBHOOK_URL_ANNULATION, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            event: 'annulation',
                            reservation: data.reservation || {},
                            token: token,
                            timestamp: new Date().toISOString()
                        })
                    });
                } catch (e) {
                    console.log('Notification n8n échouée (non bloquant)', e);
                }
            }
        } else {
            document.getElementById('resultIcon').textContent = '⚠️';
            document.getElementById('resultTitle').textContent = 'Impossible d\'annuler';
            document.getElementById('resultMsg').textContent = data.error || 'Une erreur est survenue.';
        }
    } catch (err) {
        document.getElementById('cancelForm').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('resultIcon').textContent = '❌';
        document.getElementById('resultTitle').textContent = 'Erreur';
        document.getElementById('resultMsg').textContent = 'Erreur de connexion. Réessayez.';
    }
}
</script>
