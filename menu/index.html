<!doctype html>
<html lang="fr">
<head>
<base href="https://le-rebond.fr/">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="robots" content="noindex,nofollow">
<title>Menu · Le Rebond</title>
<link rel="icon" href="favicon.ico">
<style>
    html, body {
        margin: 0;
        padding: 0;
        background: #680920;
        min-height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: #f4f0e6;
    }
    .menu-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.5rem 1rem 3rem;
        min-height: 100vh;
        box-sizing: border-box;
    }
    .menu-title {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #efa707;
        margin: 0 0 1.25rem;
        text-align: center;
    }
    .menu-pages {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        width: 100%;
        max-width: 900px;
        align-items: center;
    }
    .menu-img {
        width: 100%;
        height: auto;
        display: block;
        background: #f4f0e6;
        border-radius: 8px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .menu-actions {
        margin-top: 1.5rem;
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        justify-content: center;
    }
    .menu-link {
        display: inline-block;
        padding: 0.6rem 1.1rem;
        background: #efa707;
        color: #680920;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 0.95rem;
    }
    .menu-link--ghost {
        background: transparent;
        color: #f4f0e6;
        border: 1px solid rgba(244, 240, 230, 0.4);
    }
    .menu-link:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="menu-wrap">
    <h1 class="menu-title">Le Rebond · Menu Bar &amp; Restaurant</h1>
    <div class="menu-pages">
        <img class="menu-img" src="menu/5.png" alt="Menu Le Rebond — page 1" loading="eager">
        <img class="menu-img" src="menu/6.png" alt="Menu Le Rebond — page 2" loading="lazy">
        <img class="menu-img" src="menu/7.png" alt="Menu Le Rebond — page 3" loading="lazy">
        <img class="menu-img" src="menu/8.png" alt="Menu Le Rebond — page 4" loading="lazy">
    </div>
    <div class="menu-actions">
        <a class="menu-link menu-link--ghost" href="reserver-restaurant/">Réserver une table</a>
    </div>
</div>
</body>
</html>
